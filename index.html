<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>لعبة الموقع — التقاط التمر</title>
  <style>
    :root{
      --bg1:#f7e7c9; /* رمال فاتحة */
      --bg2:#f0d8a7; /* تدرج رمال */
      --accent:#7b3f00; /* لون التمر */
      --muted:#7c8794;
      --panel: rgba(255,255,255,0.06);
    }
    *{box-sizing:border-box;font-family: "Noto Kufi Arabic", Inter, system-ui, sans-serif}
    html,body{height:100%;margin:0;background:linear-gradient(180deg,var(--bg1),var(--bg2));color:#1a1a1a}
    .wrap{max-width:980px;margin:20px auto;padding:16px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(2,6,23,0.02));box-shadow:0 10px 30px rgba(2,6,23,0.2)}
    header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:20px}
    .controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    button, select{background:#ffdd66;border:none;padding:8px 12px;border-radius:10px;font-weight:700;cursor:pointer;color:#000}
    button.secondary{background:transparent;border:1px solid rgba(0,0,0,0.08);color:#111}
    select{min-width:110px}
    .status{display:flex;gap:12px;align-items:center}
    .status div{font-size:14px;color:var(--muted)}
    .game-area{position:relative;margin-top:12px;border-radius:12px;overflow:hidden;background:transparent}
    canvas{display:block;width:100%;height:540px;border-radius:12px}
    @media (max-width:700px){canvas{height:420px}}
    .footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;color:var(--muted);font-size:13px;flex-wrap:wrap;gap:8px}
    .touch-controls{display:none;gap:16px;margin-top:16px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}
    .touch-controls button{padding:12px 24px;border-radius:12px;font-weight:900;font-size:18px;background:#ffdd66;color:#1a1a1a;border:2px solid #dba111;cursor:pointer;box-shadow:0 4px 0 #dba111;touch-action:manipulation;user-select:none;}
    .touch-controls button:active{transform:translateY(4px);box-shadow:none;}
    /* overlay start screen */
    .overlay{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(180deg, rgba(2,6,23,0.2), rgba(255,255,255,0.02));
      z-index:6;padding:20px;
    }
    .panel{
      background:var(--panel);backdrop-filter: blur(6px);padding:18px;border-radius:12px;text-align:center;color:#072034
    }
    .small{font-size:13px;color:#08334a;margin-top:8px}
    .controls-bottom{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:10px;flex-wrap:wrap}
    .mute{background:transparent;border:1px solid rgba(0,0,0,0.06);padding:6px 8px;border-radius:8px}
  </style>
</head>
<body>
  <div class="wrap" dir="rtl">
    <header>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <h1 id="title" style="margin:0;">لعبة الموقع — التقاط التمر</h1>
        <a href="https://www.instagram.com/fo5sb/" target="_blank" rel="noopener noreferrer" style="background:linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);color:#fff;text-decoration:none;padding:6px 14px;border-radius:10px;font-weight:700;display:inline-flex;align-items:center;gap:6px;font-size:14px;box-shadow:0 4px 10px rgba(220,39,67,0.3);transition:transform 0.2s;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='none'">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
          تواصل معي
        </a>
      </div>
      <div class="controls">
        <button id="startBtn">ابدأ</button>
        <button id="pauseBtn" class="secondary">إيقاف مؤقت</button>
        <label for="difficulty">المستوى:</label>
        <select id="difficulty">
          <option value="easy">سهل</option>
          <option value="medium" selected>متوسط</option>
          <option value="hard">صعب</option>
        </select>
        <div class="status">
          <div>النتيجة: <strong id="score">0</strong></div>
          <div>أعلى: <strong id="highScore">0</strong></div>
        </div>
        <button id="toggleSound" class="mute">صوت الخلفية: تشغيل</button>
      </div>
    </header>

    <div class="game-area" style="margin-top:12px;">
      <canvas id="gameCanvas" width="980" height="540" aria-label="لوحة لعبة التقاط التمر"></canvas>

      <div class="overlay" id="startOverlay">
        <div class="panel" role="dialog" aria-modal="true">
          <h2 style="margin:0 0 8px 0">لعبة التقاط التمر</h2>
          <div class="small">الهدف: التقط جميع التمور قبل أن تلمس الأرض — إذا سقط تمر واحد تنتهي اللعبة</div>
          <div class="controls-bottom">
            <button id="overlayStart">ابدأ اللعبة ▶️</button>
            <button id="overlayHow" class="secondary">كيف ألعب؟</button>
          </div>
          <div style="margin-top:10px;font-size:12px;color:#08334a">تصميم وبرمجة: يونس الصبحي</div>
        </div>
      </div>

    </div>

    <div id="touchControls" class="touch-controls">
      <button id="leftTouch">◀ يسار</button>
      <button id="catchTouch">⬇ التقاط</button>
      <button id="rightTouch">يمين ▶</button>
    </div>

    <div class="footer">
      <div>مفاتيح: ← و → للحركة — أو المس الأزرار أسفل الموبايل</div>
      <div>تصميم وبرمجة: يونس الصبحي</div>
    </div>
  </div>

<script>
/* ---------- إعدادات و متغيرات ---------- */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d', { alpha: false });

let W = canvas.width, H = canvas.height;
function resizeCanvas(){
  const rect = canvas.getBoundingClientRect();
  // keep internal resolution proportional for crispness
  const ratio = window.devicePixelRatio || 1;
  W = Math.max(600, Math.floor(rect.width * ratio));
  H = Math.max(300, Math.floor(rect.height * ratio));
  canvas.width = W;
  canvas.height = H;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); drawStartScreen(); });

// DOM
const startBtn = document.getElementById('startBtn');
const overlayStart = document.getElementById('overlayStart');
const startOverlay = document.getElementById('startOverlay');
const pauseBtn = document.getElementById('pauseBtn');
const scoreEl = document.getElementById('score');
const highScoreEl = document.getElementById('highScore');
const difficultySelect = document.getElementById('difficulty');
const toggleSoundBtn = document.getElementById('toggleSound');

const leftTouch = document.getElementById('leftTouch');
const rightTouch = document.getElementById('rightTouch');
const catchTouch = document.getElementById('catchTouch');

let score = 0;
let highScore = parseInt(localStorage.getItem('date_highscore')||'0',10);
highScoreEl.textContent = highScore;

let running = false, paused = false;
let frame = 0;
let difficultyMultiplier = 1;
let spawnInterval = 90;
let spawnTimer = 0;
let fruits = []; // التمرات
let basket = { x: 0, y: 0, w: 140, h: 44, speed: 8 }; // سلة
let left = false, right = false;
let ambientOn = true;

/* ---------- صوتيات بواسطة WebAudio (بدون ملفات خارجية) ---------- */
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let ambientNode = null;

function ensureAudio(){
  if(!audioCtx) audioCtx = new AudioCtx();
}

function playCatchSound(){
  try{
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = 660;
    g.gain.value = 0;
    o.connect(g);
    g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    g.gain.cancelScheduledValues(now);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.12, now + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
    o.frequency.setValueAtTime(660, now);
    o.frequency.exponentialRampToValueAtTime(240, now + 0.35);
    o.start(now);
    o.stop(now + 0.4);
  }catch(e){}
}

function startAmbient(){
  try{
    if(!ambientOn) return;
    ensureAudio();
    if(ambientNode) return;
    // white noise filtered for wind-like hum
    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) output[i] = (Math.random()*2-1) * 0.35;
    const noise = audioCtx.createBufferSource();
    noise.buffer = noiseBuffer;
    noise.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1000;
    const hp = audioCtx.createBiquadFilter();
    hp.type = 'highpass';
    hp.frequency.value = 200;
    const g = audioCtx.createGain();
    g.gain.value = 0.06;
    noise.connect(lp); lp.connect(hp); hp.connect(g);
    g.connect(audioCtx.destination);
    noise.start();
    ambientNode = { noise, g };
  }catch(e){}
}

function stopAmbient(){
  try{
    if(!ambientNode) return;
    ambientNode.noise.stop();
    ambientNode.g.disconnect();
    ambientNode = null;
  }catch(e){}
}

toggleSoundBtn.addEventListener('click', ()=>{
  ambientOn = !ambientOn;
  toggleSoundBtn.textContent = ambientOn ? 'صوت الخلفية: تشغيل' : 'صوت الخلفية: إيقاف';
  if(ambientOn) startAmbient(); else stopAmbient();
});

/* ---------- إعداد الصعوبة ---------- */
function setDifficulty(level){
  if(level === 'easy'){ difficultyMultiplier=0.8; spawnInterval = 120; basket.speed=7; }
  else if(level === 'medium'){ difficultyMultiplier=1; spawnInterval = 90; basket.speed=8; }
  else if(level === 'hard'){ difficultyMultiplier=1.6; spawnInterval = 62; basket.speed=10; }
}

/* ---------- منطق التمر (الفاكهة) ---------- */
function spawnFruit(){
  // create a date (تمر) with realistic proportions
  const radius = 12 + Math.random()*18; // نصف القطر
  const x = 40 + Math.random() * (W - 80);
  const speed = (1.4 + Math.random()*1.8) * difficultyMultiplier + (frame/6000);
  fruits.push({ x, y: -radius*2, r: radius, speed, angle: Math.random()*Math.PI*2, caught:false });
}

/* ---------- تحديث الحالة ---------- */
function update(){
  if(!running || paused) return;
  frame++;
  // حركة السلة
  if(left) basket.x -= basket.speed * (window.devicePixelRatio||1);
  if(right) basket.x += basket.speed * (window.devicePixelRatio||1);
  const margin = 20 * (window.devicePixelRatio||1);
  basket.x = Math.max(margin, Math.min(W - basket.w - margin, basket.x));

  // توليد التمرات
  spawnTimer++;
  if(spawnTimer >= spawnInterval){ spawnTimer = 0; spawnFruit(); }

  // تحريك التمرات وفحص الالتقاط أو السقوط
  for(let i=fruits.length-1;i>=0;i--){
    const f = fruits[i];
    f.y += f.speed * (window.devicePixelRatio||1);
    f.angle += 0.01;
    // فحص الاصطدام مع السلة (نعتبر السلة مستطيل علوي)
    const basketTop = basket.y;
    const basketLeft = basket.x;
    const basketRight = basket.x + basket.w;
    // نقطة المنتصف للتمر
    if(!f.caught){
      // أولاً إذا التمر وصل لأسفل الساحة (لم يمسك) => خسارة
      if(f.y + f.r >= H - (20 * (window.devicePixelRatio||1))){ // "أرضية" قرب الحافة السفلية
        endGame(false);
        return;
      }
      // فحص الالتقاط: عندما يلامس التمر الجزء العلوي من السلة
      if(f.y + f.r >= basketTop && f.x >= basketLeft + 8 && f.x <= basketRight - 8){
        // تم التقاطه
        f.caught = true;
        score += 1;
        scoreEl.textContent = score;
        playCatchSound();
        // أنيمي لحركة السلة البسيطة عند الالتقاط
        f.caughtAt = { x: f.x, y: f.y };
        // إزالة التمر بعد تأثير صغير
        setTimeout(()=> {
          const idx = fruits.indexOf(f);
          if(idx>-1) fruits.splice(idx,1);
        }, 160);
      }
    }
  }
}

/* ---------- رسم الخلفية والرسم لواجهة كرتونية ---------- */
function drawDesertBackground(){
  // خلفية رمل بتدرج
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, '#f7e7c9');
  grd.addColorStop(1, '#f0d8a7');
  ctx.fillStyle = grd;
  ctx.fillRect(0,0,W,H);

  // تلال رملية كرتونية
  ctx.fillStyle = '#f2c78b';
  const hillCount = 3;
  for(let i=0;i<hillCount;i++){
    const baseY = H * (0.55 + i*0.07);
    const amp = 160 + i*60;
    ctx.beginPath();
    ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=10){
      const y = baseY + Math.sin((x/ W * Math.PI * (1+i)) + i)* (amp * 0.2) ;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W,H);
    ctx.closePath();
    ctx.globalAlpha = 0.95 - (i*0.15);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // أشجار نخيل كرتونية (مرسومة على اليمين واليسار)
  function drawPalm(cx, cy, scale = 1, flip=false){
    ctx.save();
    ctx.translate(cx, cy);
    if(flip) ctx.scale(-1,1);
    ctx.scale(scale, scale);
    // جذع
    ctx.fillStyle = '#8b5a2b';
    ctx.beginPath();
    ctx.moveTo(-8,0);
    ctx.quadraticCurveTo(-12, -40, -6, -120);
    ctx.quadraticCurveTo(-2, -160, 6, -200);
    ctx.quadraticCurveTo(12, -160, 14, -120);
    ctx.quadraticCurveTo(18, -40, 10, 0);
    ctx.closePath();
    ctx.fill();
    // جذع تفاصيل
    ctx.strokeStyle = '#74461a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(2,-190); ctx.lineTo(2,-160);
    ctx.stroke();
    // ريش النخل
    ctx.fillStyle = '#2f8a41';
    for(let i=0;i<7;i++){
      const ang = -Math.PI*0.5 + (i-3)*0.25;
      ctx.save();
      ctx.translate(4,-200);
      ctx.rotate(ang);
      ctx.beginPath();
      ctx.moveTo(0,0);
      ctx.quadraticCurveTo(60, -8, 110, -3 + i*2);
      ctx.quadraticCurveTo(80, 4, 20, 10);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();
  }
  // لوحة نخيل متعددة
  drawPalm(W*0.12, H*0.38, 1.0, false);
  drawPalm(W*0.28, H*0.44, 0.85, false);
  drawPalm(W*0.85, H*0.40, 1.05, true);
}

/* ---------- رسم السلة الكرتونية ---------- */
function drawBasket(){
  const px = basket.x, py = basket.y, w = basket.w, h = basket.h;
  // جسم السلة
  ctx.save();
  ctx.translate(px, py);
  // ظل بسيط
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(w*0.5, h*0.9, w*0.52, 10*(window.devicePixelRatio||1), 0, 0, Math.PI*2);
  ctx.fill();

  // سلة أساسية
  const grd = ctx.createLinearGradient(0,py,0,py+h);
  grd.addColorStop(0, '#e8c39b');
  grd.addColorStop(1, '#c4894f');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.moveTo(0,h*0.2);
  ctx.quadraticCurveTo(w*0.5, -h*0.4, w, h*0.2);
  ctx.lineTo(w*0.9, h*0.9);
  ctx.quadraticCurveTo(w*0.5, h*1.15, w*0.1, h*0.9);
  ctx.closePath();
  ctx.fill();

  // حواف وخطوط
  ctx.strokeStyle = 'rgba(0,0,0,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0,h*0.2);
  ctx.quadraticCurveTo(w*0.5, -h*0.4, w, h*0.2);
  ctx.stroke();

  // خطوط تزيين
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  for(let i=1;i<4;i++){
    ctx.beginPath();
    ctx.moveTo( w*0.12*i, h*0.25 + i*6);
    ctx.lineTo( w*0.12*i + 10, h*0.78 - i*2);
    ctx.stroke();
  }
  ctx.restore();
}

/* ---------- رسم التمر بشكل شبه حقيقي كرتوني ---------- */
function drawFruit(f){
  const x = f.x, y = f.y, r = f.r;
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(Math.sin(f.angle)*0.08);
  // تدرج بني
  const g = ctx.createLinearGradient(-r, -r, r, r);
  g.addColorStop(0, '#7b3f00');
  g.addColorStop(0.5, '#a05a11');
  g.addColorStop(1, '#5a2e00');
  ctx.fillStyle = g;
  // شكل بيضاوي
  ctx.beginPath();
  ctx.ellipse(0,0,r*0.9,r,0,0,Math.PI*2);
  ctx.fill();

  // تفصيل منتصف التمر
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.ellipse(-r*0.12, -r*0.06, r*0.18, r*0.12, Math.PI*0.2, 0, Math.PI*2);
  ctx.fill();

  // لمعان صغير
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath();
  ctx.ellipse(-r*0.5, -r*0.6, r*0.22, r*0.12, Math.PI*0.6, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

/* ---------- رسم كامل الإطار ---------- */
function draw(){
  // رسم الخلفية
  drawDesertBackground();

  // أرضية سوداء رقيقة في الأسفل (حافة الأرض)
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fillRect(0, H - 28 * (window.devicePixelRatio||1), W, 28 * (window.devicePixelRatio||1));

  // موضع السلة (فوق هذه الأرضية)
  basket.y = H - basket.h - 20 * (window.devicePixelRatio||1);

  // رسم التمرات
  for(const f of fruits) drawFruit(f);

  // رسم السلة أعلى التمرات (حتى تظهر أنها تلتقط)
  drawBasket();

  // لوحة نقاط صغيرة
  const panelW = 200 * (window.devicePixelRatio||1);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(12 * (window.devicePixelRatio||1), 12 * (window.devicePixelRatio||1), panelW, 44 * (window.devicePixelRatio||1));
  ctx.fillStyle = '#072034';
  ctx.font = `${14 * (window.devicePixelRatio||1)}px sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillText('النتيجة: ' + score, 24 * (window.devicePixelRatio||1), 36 * (window.devicePixelRatio||1));
}

/* ---------- شاشة البداية (عندما لا تعمل اللعبة) ---------- */
function drawStartScreen(){
  // رسم خلفية فقط + نص داخل الكانفس (الخلفية نفسها مرسومة في draw)
  drawDesertBackground();
  ctx.fillStyle = 'rgba(7,51,74,0.04)';
  ctx.fillRect(30 * (window.devicePixelRatio||1), 60 * (window.devicePixelRatio||1), W - 60 * (window.devicePixelRatio||1), H - 140 * (window.devicePixelRatio||1));
  ctx.fillStyle = '#072034';
  ctx.font = `${20 * (window.devicePixelRatio||1)}px sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('اضغط ابدأ للبدء — التقاط التمر قبل أن يلمس الأرض', W/2, H/2 - 8 * (window.devicePixelRatio||1));
  ctx.fillText('استخدم الأسهم أو أزرار اللمس للتحكم', W/2, H/2 + 30 * (window.devicePixelRatio||1));
}

/* ---------- دورة اللعبة ---------- */
function loop(){
  update();
  // مسح كامل
  // ctx.clearRect(0,0,W,H); // draw() يرسم كل شيء
  draw();
  if(running && !paused) requestAnimationFrame(loop);
}

/* ---------- إنهاء اللعبة ---------- */
function endGame(won){
  running = false;
  paused = false;
  stopAmbient();
  // تحقق وتخزين أعلى نتيجة
  if(score > highScore){
    highScore = score;
    localStorage.setItem('date_highscore', String(highScore));
    highScoreEl.textContent = highScore;
  }
  // عرض نتيجة
  setTimeout(()=>{
    alert('انتهت اللعبة! نتيجتك: ' + score);
    // إظهار واجهة البداية مجددًا
    startBtn.textContent = 'ابدأ';
    startOverlay.style.display = 'flex';
    document.getElementById('touchControls').style.display = 'none';
    drawStartScreen();
  }, 80);
}

/* ---------- بدء اللعبة ---------- */
function startGame(){
  setDifficulty(difficultySelect.value);
  fruits = [];
  spawnTimer = 0;
  frame = 0;
  score = 0; scoreEl.textContent = 0;
  running = true; paused = false;
  startBtn.textContent = 'إعادة تشغيل';
  startOverlay.style.display = 'none';
  document.getElementById('touchControls').style.display = 'flex';
  // تموضع السلة مبدئياً في الوسط
  basket.x = (W - basket.w) / 2;
  // تشغيل الصوت
  if(ambientOn) startAmbient();
  // ابدأ الحلقة
  requestAnimationFrame(loop);
}

/* ---------- أحداث الواجهة ---------- */
startBtn.addEventListener('click', ()=> {
  if(running) {
    // إعادة تشغيل
    startGame();
  } else {
    startGame();
  }
});
overlayStart.addEventListener('click', ()=> startGame());
document.getElementById('overlayHow').addEventListener('click', ()=> {
  alert('حرك السلة بالأسهم ← → أو أزرار اللمس، حاول تلتقط التمر قبل أن يلمس الأرض. إذا سقط تمر واحد تنتهي اللعبة.');
});
pauseBtn.addEventListener('click', ()=>{
  if(!running) return;
  paused = !paused;
  pauseBtn.textContent = paused ? 'استئناف' : 'إيقاف مؤقت';
  if(!paused) requestAnimationFrame(loop);
});
difficultySelect.addEventListener('change', ()=>{ if(!running) setDifficulty(difficultySelect.value); });

/* ---------- تحكمات لوحة المفاتيح ---------- */
window.addEventListener('keydown', e=>{
  if(e.key === 'ArrowLeft'){ left = true; }
  if(e.key === 'ArrowRight'){ right = true; }
  if(e.key === ' '){ // فراغ = بدء سريع
    if(!running) startGame();
  }
});
window.addEventListener('keyup', e=>{
  if(e.key === 'ArrowLeft'){ left = false; }
  if(e.key === 'ArrowRight'){ right = false; }
});

/* ---------- أزرار التحكم بالشاشة ---------- */
function bindHold(el, startCb, endCb) {
  el.addEventListener('pointerdown', e => { e.preventDefault(); startCb(); });
  el.addEventListener('pointerup', e => { e.preventDefault(); endCb(); });
  el.addEventListener('pointerleave', e => { e.preventDefault(); endCb(); });
  el.addEventListener('contextmenu', e => e.preventDefault());
}
bindHold(leftTouch, ()=> left=true, ()=> left=false);
bindHold(rightTouch, ()=> right=true, ()=> right=false);

// زر لعمل "التقاط" سريع (يفرض نزول السلة قليلًا لالتقاط أقرب تمر)
catchTouch.addEventListener('pointerdown', e=>{
  // المؤثر: نتحرك إلى أقرب تمر أفقياً إن وُجد داخل مدى
  if(fruits.length>0){
    let closest = null; let dmin = Infinity;
    for(const f of fruits){
      const dx = Math.abs((f.x) - (basket.x + basket.w/2));
      if(dx < dmin){ dmin = dx; closest = f; }
    }
    if(closest){
      // نحرك السلة أفقياً لاقتراب خلال فترة قصيرة
      const targetX = Math.min(Math.max(20, closest.x - basket.w/2), W - basket.w - 20);
      // تحريك سلس
      const steps = 8;
      const dx = (targetX - basket.x) / steps;
      let s = 0;
      const t = setInterval(()=> {
        basket.x += dx; s++;
        if(s>=steps) clearInterval(t);
      }, 25);
    }
  }
});

/* ---------- لمس موبايل: نسمح بالنقر على يمين/يسار الكانفس لتحريك السلة سريعاً ---------- */
canvas.addEventListener('touchstart', e=>{
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const x = (t.clientX - rect.left) * (window.devicePixelRatio||1);
  // إذا المسار على يسار منتصف الشاشة -> تحريك يسار (لفترة قصيرة)
  if(x < W/2){ left = true; setTimeout(()=> left=false, 220); }
  else{ right = true; setTimeout(()=> right=false, 220); }
});

/* ---------- حل لطريقة الرسم الأولي ---------- */
drawStartScreen();

/* ---------- بدء الصوت الخلفي تلقائياً عند التفاعل الأول (بعض المتصفحات تمنع التشغيل) ---------- */
document.body.addEventListener('pointerdown', function initAudioOnce(){
  try{
    ensureAudio();
    if(ambientOn) startAmbient();
  }catch(e){}
  document.body.removeEventListener('pointerdown', initAudioOnce);
});

/* ---------- تأكد أن الحجم والتناسب مضبوطان للعرض ---------- */
(function init(){
  setDifficulty(difficultySelect.value);
  // نرسم شاشة البداية مبدئياً
  drawStartScreen();
})();
</script>
